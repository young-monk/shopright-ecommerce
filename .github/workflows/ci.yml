name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GCP_REGION: us-central1

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend-lint-test:
    name: Frontend - Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  # ── Backend Services ──────────────────────────────────────────────────────
  backend-test:
    name: Backend - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, product-service, order-service, user-service]
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt
      - run: pip install -r requirements.txt pytest httpx
      - run: python -m pytest tests/ -v --tb=short || echo "No tests found"

  # ── AI Services ───────────────────────────────────────────────────────────
  ai-test:
    name: AI Services - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [chatbot, analytics]
    defaults:
      run:
        working-directory: ai/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest tests/ -v --tb=short || echo "No tests found"
