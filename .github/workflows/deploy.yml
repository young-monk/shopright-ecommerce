name: Deploy to GCP

on:
  push:
    branches: [main]

env:
  GCP_REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - service: frontend
            context: frontend
            image: frontend
            cloud_run_name: frontend
            port: 3000
          - service: api-gateway
            context: backend/api-gateway
            image: api-gateway
            cloud_run_name: api-gateway
            port: 8000
          - service: product-service
            context: backend/product-service
            image: product-service
            cloud_run_name: product-service
            port: 8001
          - service: order-service
            context: backend/order-service
            image: order-service
            cloud_run_name: order-service
            port: 8002
          - service: user-service
            context: backend/user-service
            image: user-service
            cloud_run_name: user-service
            port: 8003
          - service: chatbot
            context: ai/chatbot
            image: chatbot
            cloud_run_name: chatbot-service
            port: 8004
          - service: analytics
            context: ai/analytics
            image: analytics
            cloud_run_name: analytics
            port: 8005
          - service: analytics-toolbox
            context: ai/analytics/toolbox
            image: analytics-toolbox
            cloud_run_name: analytics
            port: 5000

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/shopright/${{ matrix.image }}
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ${{ matrix.context }}
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  deploy:
    name: Deploy - ${{ matrix.cloud_run_name }}
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - image: frontend
            cloud_run_name: frontend
            container_name: ""
          - image: api-gateway
            cloud_run_name: api-gateway
            container_name: ""
          - image: product-service
            cloud_run_name: product-service
            container_name: ""
          - image: order-service
            cloud_run_name: order-service
            container_name: ""
          - image: user-service
            cloud_run_name: user-service
            container_name: ""
          - image: chatbot
            cloud_run_name: chatbot-service
            container_name: ""
          - image: analytics
            cloud_run_name: analytics
            container_name: analytics
          - image: analytics-toolbox
            cloud_run_name: analytics
            container_name: toolbox

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/shopright/${{ matrix.image }}:${{ github.sha }}
          CONTAINER_FLAG=""
          if [ -n "${{ matrix.container_name }}" ]; then
            CONTAINER_FLAG="--container ${{ matrix.container_name }}"
          fi
          gcloud run services update ${{ matrix.cloud_run_name }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet \
            $CONTAINER_FLAG \
            --image $IMAGE
          echo "Deployed ${{ matrix.cloud_run_name }}${CONTAINER_FLAG}"
