services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shopright}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-shopright}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infra/sql/seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopright -d shopright"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  product-service:
    build: ./backend/product-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL_ASYNC:-postgresql+asyncpg://shopright:shopright_dev@postgres:5432/shopright}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  order-service:
    build: ./backend/order-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=${DATABASE_URL_ASYNC:-postgresql+asyncpg://shopright:shopright_dev@postgres:5432/shopright}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  user-service:
    build: ./backend/user-service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=${DATABASE_URL_ASYNC:-postgresql+asyncpg://shopright:shopright_dev@postgres:5432/shopright}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  chatbot:
    build: ./ai/chatbot
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://shopright:shopright_dev@postgres:5432/shopright}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - VERTEX_AI_LOCATION=us-central1
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8000:8000"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:8001
      - ORDER_SERVICE_URL=http://order-service:8002
      - USER_SERVICE_URL=http://user-service:8003
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      - product-service
      - order-service
      - user-service
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
      - CHATBOT_SERVICE_URL=http://chatbot:8004
    depends_on:
      - api-gateway

  analytics:
    build: ./ai/analytics
    ports:
      - "8005:8005"
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - BIGQUERY_DATASET=chat_analytics
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GEMINI_API_KEY:-}
      - GMAIL_SENDER=${GMAIL_SENDER:-hallyalasridhar@gmail.com}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-zxcagpwirfemcibj}
      - DEVOPS_EMAIL=${DEVOPS_EMAIL:-hallyalasridhar@gmail.com}
      - TECH_EMAIL=${TECH_EMAIL:-hallyalasridhar@gmail.com}
      - BUSINESS_EMAIL=${BUSINESS_EMAIL:-hallyalasridhar@gmail.com}
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/adc.json
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro

volumes:
  postgres_data:
